services:
  # Contenedor 2 — Base de Datos: PostgreSQL 16 con volumen persistente
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cluster_network

  # Contenedor 3 — PgAdmin: Panel de administración web para PostgreSQL
  pgadmin-panel:
    image: dpage/pgadmin4
    container_name: pgadmin_panel_container
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - postgres
    networks:
      - cluster_network

  # Contenedor 4 — JupyterLab: Usando tu entorno local existente
  jupyter:
    image: jupyter/base-notebook:latest
    container_name: jupyter_notebook_container
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    networks:
      - cluster_network

  # Contenedor 1 — Servidor Web: Next.js 14 en su puerto nativo 3001
  next-app:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    container_name: querys_bomber_app
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_NAME=postgres
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      - postgres
    networks:
      - cluster_network

volumes:
  pgdata:

networks:
  cluster_network:
    driver: bridge
